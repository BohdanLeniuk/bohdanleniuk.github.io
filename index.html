<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bohdan Leniuk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f3f6ef;
      --panel: #fffef8;
      --ink: #1f2a24;
      --muted: #5c6a62;
      --accent: #1f6f50;
      --line: #dae3d8;
      --serif: 'Fraunces', Georgia, serif;
      --sans: 'Manrope', system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 12%, rgba(31,111,80,0.1), transparent 28%),
        radial-gradient(circle at 88% 84%, rgba(31,111,80,0.08), transparent 24%),
        var(--bg);
      animation: fadeIn 0.45s ease;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 3rem;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.25rem;
    }

    .name {
      text-decoration: none;
      color: var(--ink);
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    nav {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.92rem;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    nav a:hover,
    nav a[aria-current="page"] {
      color: var(--accent);
      border-color: var(--accent);
    }

    main {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 2.2rem;
      box-shadow: 0 10px 25px rgba(16, 36, 29, 0.08);
    }

    .intro-label {
      margin: 0;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--accent);
      font-weight: 700;
      animation: rise 0.45s ease;
    }

    h1 {
      margin: 0.65rem 0 1rem;
      font-family: var(--serif);
      font-size: clamp(2rem, 4.5vw, 3rem);
      line-height: 1.15;
      font-weight: 600;
      animation: rise 0.55s ease;
    }

    .intro {
      margin: 0;
      max-width: 64ch;
      font-size: 1.03rem;
      line-height: 1.75;
      color: var(--muted);
      animation: rise 0.7s ease;
    }

    .photo-note {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: var(--muted);
      font-style: italic;
      animation: rise 0.8s ease;
    }

    .cta {
      margin-top: 1.8rem;
      display: flex;
      gap: 0.9rem;
      flex-wrap: wrap;
      animation: rise 0.9s ease;
    }

    .btn {
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.01em;
      border-radius: 999px;
      padding: 0.68rem 1.1rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .btn-main {
      background: var(--accent);
      color: #f6fff9;
      box-shadow: 0 6px 14px rgba(31,111,80,0.22);
    }

    .btn-sub {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-main:hover {
      box-shadow: 0 10px 18px rgba(31,111,80,0.24);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 640px) {
      .top {
        flex-direction: column;
        align-items: flex-start;
      }

      main {
        padding: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <a class="name" href="index.html">Bohdan Leniuk</a>
      <nav>
        <a href="index.html" aria-current="page">Home</a>
        <a href="research.html">Research</a>
        <a href="cv.pdf" target="_blank" rel="noopener">CV</a>
      </nav>
    </header>

    <main>
      <p class="intro-label">Personal Site</p>
      <h1>Bohdan Leniuk</h1>
      <p class="intro">
        Welcome to my website. I use this page as a central home for my profile and current work.
        My CV and research list are available through the links below.
      </p>
      <p class="photo-note">A profile photo will be added here soon.</p>

      <div class="cta" aria-label="Primary links">
        <a class="btn btn-main" href="research.html">View Research</a>
        <a class="btn btn-sub" href="cv.pdf" target="_blank" rel="noopener">Open CV</a>
      </div>
    </main>
  </div>
</body>
</html>
